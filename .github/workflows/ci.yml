name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none,x86_64-unknown-uefi

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Install QEMU and firmware
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf mtools grub-pc-bin xorriso

      - name: Build (UEFI)
        run: ./scripts/build_os.sh

      - name: Verify build
        run: ./scripts/verify_build.sh

      - name: Rust tests
        run: ./scripts/test_all_rust.sh

      - name: Build GRUB ISO
        run: ./scripts/build_grub_iso.sh

      - name: UEFI serial test
        run: SKIP_BUILD=1 ./scripts/test_qemu_serial.sh
        env:
          TIMEOUT: 20

      - name: GRUB serial test
        run: SKIP_BUILD=1 ./scripts/test_qemu_serial_grub.sh
        env:
          TIMEOUT: 25

      - name: Boot stress (short)
        run: SKIP_BUILD=1 ITER=3 ./scripts/boot_stress.sh
        env:
          TIMEOUT: 25
